<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略训练 · 纯竞技扑克</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #1a2f1f 0%, #0c1a12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
            color: #ecead8;
        }

        /* 细微的卡片纹理覆盖 (低调压花) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L 90 10 M10 30 L 90 30 M10 50 L 90 50 M10 70 L 90 70 M10 90 L 90 90 M10 10 L 10 90 M30 10 L 30 90 M50 10 L 50 90 M70 10 L 70 90 M90 10 L 90 90" stroke="rgba(255,215,0,0.03)" stroke-width="1.2"/></svg>');
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片 —— 桌面筹码区域 */
        .poker-home {
            background: rgba(10, 20, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 170, 100, 0.35);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px #2f4b2f inset, 0 0 0 4px #b99b6b inset;
            padding: 3rem 3.5rem 4rem 3.5rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .poker-home:hover {
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.9), 0 0 0 2px #3e6b3e inset, 0 0 0 4px #e4c27e inset;
        }

        /* 标题区域 + 装饰 */
        .welcome-message {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #cdba8d;
            text-shadow: 0 2px 4px #00000050;
            margin-bottom: 0.75rem;
        }

        .welcome-message i {
            margin: 0 12px;
            color: #cb9e5b;
            font-size: 1.8rem;
            vertical-align: middle;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #f7e9c3;
            text-shadow: 4px 4px 0 #2b4a2b, 7px 7px 0 #00000030;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
            word-break: break-word;
        }

        /* logo 区域 — 增加辉光与圆润感 */
        .logo-container {
            margin: 2rem 0 2rem 0;
            padding: 15px;
            background: #1e331eb0;
            border-radius: 200px;
            display: inline-block;
            border: 2px dashed #c4a064;
            transition: transform 0.2s;
        }

        .logo-container:hover {
            transform: scale(1.01);
            border-color: #f5c67e;
        }

        img[th\:src*="logo"] {
            max-width: 320px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 12px #00000070);
            border-radius: 48px;
        }

        /* 牌桌标语 / 牌局状态 */
        .table-talk {
            font-size: 1.25rem;
            background: #1b2c1b;
            border-radius: 60px;
            padding: 12px 30px;
            margin: 30px 0 30px 0;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #7f6b42;
            box-shadow: inset 0 1px 4px #a58b55, 0 8px 0 #0a1f0a;
            color: #ffefcf;
            font-weight: 500;
            flex-wrap: wrap;
            justify-content: center;
        }

        .table-talk i {
            font-size: 1.9rem;
            color: #f3c26b;
        }

        /* 开始表单 — 去掉默认样式，做成大筹码/按钮 */
        form {
            margin: 40px 0 15px 0;
            display: flex;
            justify-content: center;
        }

        input[type="submit"] {
            background: #d4a259;
            border: none;
            padding: 22px 70px;
            border-radius: 60px;
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #1f3a1f;
            box-shadow: 0 12px 0 #7b532a, 0 8px 20px #000000aa;
            cursor: pointer;
            transition: 0.1s linear;
            border: 2px solid #fad893;
            font-family: 'Inter', sans-serif;
            width: 100%;
            max-width: 450px;
            transform: translateY(-3px);
        }

        input[type="submit"]:hover {
            background: #eeb96f;
            box-shadow: 0 8px 0 #7b532a, 0 12px 28px black;
            transform: translateY(2px);
            border-color: #ffe4ac;
        }

        input[type="submit"]:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #7b532a, 0 8px 18px black;
        }

        /* 德州扑克特色小标记 —— 花色 */
        .suit-decor {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 30px;
            font-size: 2.2rem;
            color: #cab27e;
            opacity: 0.8;
        }

        .suit-decor span {
            transition: all 0.2s;
            filter: drop-shadow(2px 4px 4px black);
        }

        .suit-decor span:hover {
            transform: scale(1.2);
            color: #f5d79c;
        }

        /* 牌桌人数/小提示 (假动态) */
        .live-info {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 1.1rem;
            background: #0f220fb0;
            border-radius: 100px;
            padding: 12px 24px;
            margin-top: 35px;
            border: 1px solid #7d6b44;
            color: #b9aa82;
            flex-wrap: wrap;
        }

        .live-info div i {
            color: #ebc476;
            margin-right: 8px;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b1975a, transparent);
            margin: 25px 0 15px 0;
        }

        /* 响应式微调 */
        @media (max-width: 550px) {
            .poker-home {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            input[type="submit"] {
                font-size: 1.6rem;
                padding: 18px 30px;
                letter-spacing: 3px;
            }
            .table-talk {
                font-size: 1rem;
                padding: 10px 18px;
            }
        }

        .blink-chip {
            animation: soft-blink 2.4s infinite;
        }
        @keyframes soft-blink {
            0% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
            50% { opacity: 1; text-shadow: 0 0 10px #ffc657, 0 0 20px #b37b2e; }
            100% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
        }
    </style>
</head>
<body>
<div class="poker-home">
    <div class="welcome-message">
        <i class="fas fa-club"></i>  WELCOME TO THE FELT  <i class="fas fa-spade"></i>
    </div>

    <h1>
        <span class="blink-chip">♦</span> TEXAS HOLD'EM <span class="blink-chip">♠</span>
    </h1>

    <div class="table-talk">
        <i class="fas fa-crown"></i>
        <span>🎴 多轮次游戏竞技 🎴</span>
        <i class="fas fa-coins"></i>
    </div>

    <form method="post">
        <input type="submit" value="START" title="坐上牌桌"/>
    </form>

    <!-- 花色装饰 致敬扑克起源 -->
    <div class="suit-decor">
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
    </div>

    <hr />

    <div style="margin-top: 25px; font-size: 0.8rem; color: #685f44;">
        <i class="fas fa-shield-alt"> 仅供玩法实现，请勿涉及任何金钱交易</i>
    </div>
</div>
</body>
</html>
