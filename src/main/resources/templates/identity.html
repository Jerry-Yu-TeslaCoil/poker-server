<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略训练 · 纯竞技扑克</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #1a2f1f 0%, #0c1a12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
            color: #ecead8;
        }

        /* 细微的卡片纹理覆盖 (低调压花) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L 90 10 M10 30 L 90 30 M10 50 L 90 50 M10 70 L 90 70 M10 90 L 90 90 M10 10 L 10 90 M30 10 L 30 90 M50 10 L 50 90 M70 10 L 70 90 M90 10 L 90 90" stroke="rgba(255,215,0,0.03)" stroke-width="1.2"/></svg>');
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片 —— 桌面筹码区域 */
        .poker-home {
            background: rgba(10, 20, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 170, 100, 0.35);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px #2f4b2f inset, 0 0 0 4px #b99b6b inset;
            padding: 3rem 3.5rem 4rem 3.5rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .poker-home:hover {
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.9), 0 0 0 2px #3e6b3e inset, 0 0 0 4px #e4c27e inset;
        }

        /* 标题区域 + 装饰 */
        .welcome-message {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #cdba8d;
            text-shadow: 0 2px 4px #00000050;
            margin-bottom: 0.75rem;
        }

        .welcome-message i {
            margin: 0 12px;
            color: #cb9e5b;
            font-size: 1.8rem;
            vertical-align: middle;
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #f7e9c3;
            text-shadow: 4px 4px 0 #2b4a2b, 7px 7px 0 #00000030;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
            word-break: break-word;
        }

        /* 牌桌标语 / 牌局状态 */
        .table-talk {
            font-size: 1.25rem;
            background: #1b2c1b;
            border-radius: 60px;
            padding: 12px 30px;
            margin: 20px 0 30px 0;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #7f6b42;
            box-shadow: inset 0 1px 4px #a58b55, 0 8px 0 #0a1f0a;
            color: #ffefcf;
            font-weight: 500;
            flex-wrap: wrap;
            justify-content: center;
        }

        .table-talk i {
            font-size: 1.9rem;
            color: #f3c26b;
        }

        /* 玩家名称输入区 — 沿用牌桌风格 */
        .player-name-area {
            margin: 35px 0 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: #1b2f1bb0;
            border-radius: 80px;
            padding: 15px 30px;
            border: 1px solid #b1975a;
            box-shadow: inset 0 2px 5px #2d462d, 0 6px 0 #0f220f;
            flex-wrap: wrap;
        }

        .player-name-area label {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ecdbaa;
            letter-spacing: 1px;
        }

        .player-name-area input[type="text"] {
            background: #2c402c;
            border: 2px solid #c9ac6b;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 1.3rem;
            color: #f7efd6;
            font-weight: 500;
            outline: none;
            width: 240px;
            font-family: 'Inter', sans-serif;
            box-shadow: inset 0 4px 6px #1e2d1e;
            transition: all 0.15s;
        }

        .player-name-area input[type="text"]:focus {
            border-color: #fad262;
            background: #385238;
            box-shadow: 0 0 12px #ffd78c, inset 0 2px 8px #1e2a1e;
        }

        .player-name-area input[type="text"]::placeholder {
            color: #8f9e7f;
            font-style: italic;
            font-size: 1.1rem;
        }

        /* 多按钮筹码区 — 四个模式，风格仿照大筹码 */
        .mode-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
            margin: 40px 0 15px 0;
        }

        .mode-btn {
            background: #d4a259;
            border: none;
            padding: 18px 24px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #1f3a1f;
            box-shadow: 0 10px 0 #7b532a, 0 8px 18px #000000aa;
            cursor: pointer;
            transition: 0.08s linear;
            border: 2px solid #fad893;
            font-family: 'Inter', sans-serif;
            min-width: 180px;
            transform: translateY(-2px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-btn i {
            font-size: 1.7rem;
            color: #2f4d2f;
            text-shadow: 1px 1px 0 #efc47e;
        }

        .mode-btn:hover {
            background: #eeb96f;
            box-shadow: 0 7px 0 #7b532a, 0 12px 24px black;
            transform: translateY(2px);
            border-color: #ffe4ac;
        }

        .mode-btn:active {
            transform: translateY(8px);
            box-shadow: 0 4px 0 #7b532a, 0 8px 16px black;
        }

        /* 中间的小提示或额外信息 */
        .suit-decor {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin-top: 30px;
            font-size: 2.2rem;
            color: #cab27e;
            opacity: 0.8;
        }

        .suit-decor span {
            transition: all 0.2s;
            filter: drop-shadow(2px 4px 4px black);
        }

        .suit-decor span:hover {
            transform: scale(1.2);
            color: #f5d79c;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b1975a, transparent);
            margin: 25px 0 15px 0;
        }

        .blink-chip {
            animation: soft-blink 2.4s infinite;
        }
        @keyframes soft-blink {
            0% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
            50% { opacity: 1; text-shadow: 0 0 10px #ffc657, 0 0 20px #b37b2e; }
            100% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
        }

        /* 额外辅助样式 */
        .footnote {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #685f44;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .footnote i {
            margin-right: 6px;
        }

        /* 响应式微调 */
        @media (max-width: 650px) {
            .poker-home {
                padding: 2rem 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
            .mode-btn {
                font-size: 1.3rem;
                padding: 15px 12px;
                min-width: 140px;
            }
            .player-name-area {
                flex-direction: column;
                padding: 20px;
                border-radius: 50px;
            }
            .player-name-area input[type="text"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="poker-home">
    <div class="welcome-message">
        <i class="fas fa-club"></i>  WELCOME TO THE FELT  <i class="fas fa-spade"></i>
    </div>

    <h1>
        <span class="blink-chip">♦</span> TEXAS HOLD'EM <span class="blink-chip">♠</span>
    </h1>

    <div class="table-talk">
        <i class="fas fa-crown"></i>
        <span>🎴 选择你的对战规模 🎴</span>
        <i class="fas fa-coins"></i>
    </div>

    <!-- 原来的名字输入表单，但将提交按钮替换为多个按钮，同时保留用户名 -->
    <form method="post" id="gameForm">
        <!-- 玩家名称区域，按之前风格包装 -->
        <div class="player-name-area">
            <label for="username"><i class="fas fa-user"></i> 你的名字</label>
            <input type="text" id="username" name="username" placeholder="冠军姓名" value=""/>
        </div>

        <!-- 多个按钮区域: 两人20轮次，四人16轮次，六人12轮次，十人10轮次 -->
        <!-- 每个按钮的 value 将作为额外的参数，但浏览器只提交点击的那个按钮。
             为了后端能区分，我们给每个按钮设置 name="mode" 和不同的 value -->
        <div class="mode-buttons">
            <button type="submit" name="mode" value="2players_20rounds" class="mode-btn">
                <i class="fas fa-user-friends"></i> 2人 · 20轮
            </button>
            <button type="submit" name="mode" value="4players_16rounds" class="mode-btn">
                <i class="fas fa-users"></i> 4人 · 16轮
            </button>
            <button type="submit" name="mode" value="6players_12rounds" class="mode-btn">
                <i class="fas fa-users"></i> 6人 · 12轮
            </button>
            <button type="submit" name="mode" value="10players_10rounds" class="mode-btn">
                <i class="fas fa-user-plus"></i> 10人 · 10轮
            </button>
        </div>

        <!-- 隐藏按钮确保回车也能提交（可选），也可以保留一个隐藏提交，但这里直接通过四个按钮已经够用，
             如果希望在输入框回车以默认方式提交，可以增加一个隐藏的常规提交，但为了避免歧义，我们让回车选中第一个按钮?
             或者增加一个隐藏的input type="submit" 样式隐藏，但为了不破坏视觉，我们不加了，用户需要点击具体按钮。
             考虑更好的体验：如果用户没点按钮，只按回车，默认不会提交。我们可以在js里做fallback, 但简单起见就依赖按钮。 -->
    </form>

    <!-- 花色装饰 致敬扑克起源 -->
    <div class="suit-decor">
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
    </div>

    <hr />

    <div class="footnote">
        <i class="fas fa-shield-alt"></i> 仅供玩法实现 · 请勿涉及任何金钱交易
        <i class="fas fa-diamond"></i>
    </div>

    <!-- 极简额外装饰：动态筹码闪光 -->
    <div style="margin-top: 15px; font-size: 1rem; color: #b49b63;">
        <i class="fas fa-circle-notch fa-spin"></i> 选好模式，坐上牌桌 <i class="fas fa-circle-notch fa-spin"></i>
    </div>
</div>

<!-- 可添加一小段脚本，让提交前校验用户名非空（纯前端提示，友好） -->
<script>
    (function() {
        const form = document.getElementById('gameForm');
        const usernameInput = document.getElementById('username');
        const modeButtons = document.querySelectorAll('.mode-btn');

        // 给每个按钮附加点击事件，若用户名为空给出提醒但依然提交（由后端处理）；但为了优雅，可以提示
        // 这不是必须的，但符合交互
        modeButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                // 去除两端空格后检查
                if (!usernameInput.value.trim()) {
                    e.preventDefault();   // 阻止提交
                    // 仿扑克风格弹出提示 (没有用alert避免破坏沉浸感，采用临时tooltip风格)
                    // 简单起见使用浏览器自带提示，也可以创建一个浮动提示，但为了简洁，用alert
                    // 但alert太突兀，改用更优雅的筹码闪烁提示: 将输入框标红
                    usernameInput.style.borderColor = '#d44b4b';
                    usernameInput.style.boxShadow = '0 0 15px #d44b4b';
                    setTimeout(() => {
                        usernameInput.style.borderColor = '#c9ac6b';
                        usernameInput.style.boxShadow = 'inset 0 4px 6px #1e2d1e';
                    }, 500);
                    // 显示一个临时的小提示
                    const hint = document.createElement('div');
                    hint.innerText = '✋ 请先填入你的大名';
                    hint.style.position = 'absolute';
                    hint.style.background = '#4f3822';
                    hint.style.color = '#ffdba5';
                    hint.style.padding = '8px 20px';
                    hint.style.borderRadius = '40px';
                    hint.style.border = '2px solid #dba55c';
                    hint.style.boxShadow = '0 6px 0 #3d2b14';
                    hint.style.fontWeight = 'bold';
                    hint.style.zIndex = '999';
                    hint.style.backdropFilter = 'blur(4px)';
                    // 定位在输入框下方
                    const rect = usernameInput.getBoundingClientRect();
                    hint.style.left = (rect.left + window.scrollX - 20) + 'px';
                    hint.style.top = (rect.bottom + window.scrollY + 10) + 'px';
                    document.body.appendChild(hint);
                    setTimeout(() => { hint.remove(); }, 2000);
                } else {
                    // 正常提交，可以加一点动态效果
                    btn.style.transform = 'translateY(8px)';
                    btn.style.boxShadow = '0 4px 0 #7b532a, 0 8px 18px black';
                    // 不做阻止，让表单提交
                }
            });
        });

        // 同时防止回车直接提交表单（因为没有指定默认按钮，回车行为可能引发问题，有些浏览器会触发第一个提交按钮）
        // 我们捕获回车，让回车直接触发第一个按钮的行为? 或者忽略。这里为了统一，回车时如果有文字，触发2人模式(或随便)
        // 更合理：回车触发表单时，我们手动调用一个默认模式。但为了精确，可以禁止回车提交，只让用户点按钮。
        form.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();  // 阻止回车提交，用户必须点击具体按钮
                // 可选给个闪烁提示
                const firstBtn = document.querySelector('.mode-btn');
                firstBtn.style.boxShadow = '0 0 0 3px #f5c26b';
                setTimeout(() => firstBtn.style.boxShadow = '', 300);
            }
        });

        // 另外为了可玩性，不加严格的阻止，如果用户执意回车，目前不会提交，因为所有按钮都是name=mode，回车无法确定mode
        // 所以我们保持了体验的一致性。
    })();
</script>
</body>
</html>
