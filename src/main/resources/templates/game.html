<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略训练 · 纯竞技扑克</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #1a2f1f 0%, #0c1a12 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
            color: #ecead8;
        }

        /* 细微的卡片纹理覆盖 (低调压花) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" /><path d="M10 10 L 90 10 M10 30 L 90 30 M10 50 L 90 50 M10 70 L 90 70 M10 90 L 90 90 M10 10 L 10 90 M30 10 L 30 90 M50 10 L 50 90 M70 10 L 70 90 M90 10 L 90 90" stroke="rgba(255,215,0,0.03)" stroke-width="1.2"/></svg>');
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        /* 主卡片 —— 桌面筹码区域，现在作为最外层容器 */
        .poker-home {
            background: rgba(10, 20, 10, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(200, 170, 100, 0.35);
            border-radius: 48px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.8), 0 0 0 2px #2f4b2f inset, 0 0 0 4px #b99b6b inset;
            padding: 2.5rem 2.5rem 3rem 2.5rem;
            max-width: 1400px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
            transition: box-shadow 0.3s ease;
        }

        .poker-home:hover {
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.9), 0 0 0 2px #3e6b3e inset, 0 0 0 4px #e4c27e inset;
        }

        /* 标题区域 + 装饰 */
        .welcome-message {
            font-weight: 600;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #cdba8d;
            text-shadow: 0 2px 4px #00000050;
            margin-bottom: 0.75rem;
        }

        .welcome-message i {
            margin: 0 12px;
            color: #cb9e5b;
            font-size: 1.8rem;
            vertical-align: middle;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #f7e9c3;
            text-shadow: 4px 4px 0 #2b4a2b, 7px 7px 0 #00000030;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 20px;
            word-break: break-word;
        }

        /* 牌桌标语 / 牌局状态 */
        .table-talk {
            font-size: 1.25rem;
            background: #1b2c1b;
            border-radius: 60px;
            padding: 10px 28px;
            margin: 10px 0 25px 0;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #7f6b42;
            box-shadow: inset 0 1px 4px #a58b55, 0 8px 0 #0a1f0a;
            color: #ffefcf;
            font-weight: 500;
            flex-wrap: wrap;
            justify-content: center;
        }

        .table-talk i {
            font-size: 1.9rem;
            color: #f3c26b;
        }

        /* 状态栏 + 底池 - 融入牌桌 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0 25px;
            padding: 0 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .game-state-badge {
            background: #1b3427;
            backdrop-filter: blur(4px);
            padding: 8px 28px;
            border-radius: 60px;
            color: #faeeb6;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
            border: 1px solid #dec27a;
            box-shadow: 0 5px 0 #0d251b;
            text-transform: uppercase;
        }

        .pot-chip {
            background: #2a281c;
            padding: 8px 32px;
            border-radius: 10rem;
            border: 2px solid #f8d47a;
            box-shadow: 0 6px 0 #6b4f25, inset 0 2px 10px #ffecb3;
            color: #fbe198;
            font-size: 1.8rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .pot-chip::before {
            content: "🪙";
            font-size: 2rem;
            filter: drop-shadow(0 2px 2px gold);
        }

        /* 公共牌区 */
        .board-cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            perspective: 800px;
        }

        .card-slot {
            width: 90px;
            height: 126px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border: 3px dashed #e5c884;
            box-shadow: 0 10px 0 #3f2f16, inset 0 0 10px #ffffff30;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: #d4c9a6;
            text-shadow: 0 2px 5px black;
            backdrop-filter: blur(2px);
        }

        /* 卡片样式 —— 奢华浮雕 */
        .card {
            width: 90px;
            height: 126px;
            background: #faf7f0;
            background: linear-gradient(145deg, #ffffff, #f0e8da);
            border-radius: 14px;
            border: 1px solid #ddd0b0;
            box-shadow: 0 10px 0 #7a5f32, 0 4px 12px rgba(0,0,0,0.7), inset 0 -2px 0 #baa78b;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px 8px;
            font-weight: 800;
            position: relative;
            transition: transform 0.15s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 0 #7a5f32, 0 8px 18px black;
        }

        .card.red { color: #bc1c2e; }
        .card.black { color: #1f2a38; }

        .card .top-left {
            align-self: flex-start;
            font-size: 26px;
            line-height: 1;
        }

        .card .bottom-right {
            align-self: flex-end;
            font-size: 26px;
            transform: rotate(180deg);
            line-height: 1;
        }

        .card .suit-big {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 54px;
            opacity: 0.2;
            color: #333;
        }

        /* 玩家区域 */
        .players-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .player-spot {
            flex: 1 1 280px;
            min-width: 260px;
            background: rgba(8, 38, 26, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px 40px 30px 30px;
            padding: 22px 20px 20px;
            border: 3px solid #dbb558;
            border-top-width: 5px;
            box-shadow: 0 18px 15px -8px black, inset 0 -6px 0 #17412e;
            transition: all 0.2s;
        }

        .player-spot.active-turn {
            border-color: #ffe066;
            box-shadow: 0 0 0 4px #ffd966, 0 18px 20px -5px black;
            background: #1b523b;
        }

        .player-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff4cf;
            text-shadow: 0 2px 5px #152f1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-status {
            background: #191e0f;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 1.2rem;
            color: #fedc83;
        }

        .hole-cards {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 18px 0;
        }

        .hole-card {
            width: 70px;
            height: 100px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 2rem;
            box-shadow: 0 8px 0 #4f3f24, 0 0 0 2px #dbb882 inset;
            transition: 0.1s;
        }

        .hole-card.back {
            background: repeating-linear-gradient(45deg, #2f5575, #2f5575 8px, #3c6b95 8px, #3c6b95 16px);
            color: #efdbaf;
            font-size: 1.4rem;
            text-shadow: 0 2px 0 #111;
            box-shadow: 0 8px 0 #1f364d, 0 0 0 2px #c8a453 inset;
        }

        .chips-info {
            background: #10261d;
            border-radius: 60px;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #b6995a;
            font-weight: 500;
            color: #f9eac3;
            font-size: 1.1rem;
            box-shadow: inset 0 2px 5px #00000050;
        }

        /* 操作面板 —— 华丽筹码风格按钮 */
        .action-panel {
            background: #1f4a32;
            background: linear-gradient(145deg, #235f3e, #133d26);
            border-radius: 120px;
            padding: 28px 35px;
            border: 3px solid #ebcb81;
            box-shadow: 0 15px 0 #4b3920, inset 0 2px 15px #ebf0b0;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px 30px;
            margin: 25px 0 15px;
        }

        .action-btn {
            background: #f7eeca;
            background: linear-gradient(180deg, #fff1c7, #edd79b);
            border: none;
            border-radius: 50px;
            padding: 16px 32px;
            font-size: 1.9rem;
            font-weight: 800;
            color: #174e2b;
            border-bottom: 7px solid #a58344;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 8px 10px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .action-btn:active {
            border-bottom-width: 2px;
            transform: translateY(5px);
            background: #ffeab3;
        }

        .action-btn:disabled {
            opacity: 0.4;
            border-bottom-width: 7px;
            transform: none;
            pointer-events: none;
            filter: grayscale(0.6);
        }

        .raise-input {
            width: 120px;
            padding: 16px 12px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: #efe9cf;
            border-bottom: 7px solid #7b6a41;
            text-align: center;
            color: #1b4b27;
            box-shadow: inset 0 2px 5px #baa982;
        }

        .raise-input:focus {
            outline: 3px solid #ffd966;
        }

        .hint-text {
            color: #fef3cd;
            font-size: 1.4rem;
            font-weight: 500;
            padding: 5px 20px;
            background: #1f4429b0;
            border-radius: 40px;
            border-left: 4px solid #fccf7c;
        }

        /* 日志区域 (复古终端风格，但融入整体) */
        .log-area {
            background: #0b1d15;
            border-radius: 30px;
            padding: 16px 22px;
            margin: 25px 0 20px;
            color: #b9f1b9;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.95rem;
            border: 2px solid #b9994b;
            box-shadow: inset 0 0 20px #000000, 0 5px 0 #3b3b1c;
            max-height: 130px;
            overflow-y: auto;
            scroll-behavior: smooth;
            text-align: left;
        }

        .log-area div {
            padding: 4px 0;
            border-bottom: 1px dotted #577a5a;
        }

        /* 调试工具按钮，小尺寸融入 */
        .debug-tools {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 15px;
        }
        .debug-btn {
            background: #3f6350;
            border: none;
            color: #f2eac2;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            border-bottom: 5px solid #1b392b;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 3px 8px black;
            font-size: 0.9rem;
        }
        .debug-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        /* 花色装饰 */
        .suit-decor {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 25px 0 10px;
            font-size: 2.2rem;
            color: #cab27e;
            opacity: 0.8;
        }

        .suit-decor span {
            transition: all 0.2s;
            filter: drop-shadow(2px 4px 4px black);
        }

        .suit-decor span:hover {
            transform: scale(1.2);
            color: #f5d79c;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b1975a, transparent);
            margin: 20px 0;
        }

        .blink-chip {
            animation: soft-blink 2.4s infinite;
        }
        @keyframes soft-blink {
            0% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
            50% { opacity: 1; text-shadow: 0 0 10px #ffc657, 0 0 20px #b37b2e; }
            100% { opacity: 0.9; text-shadow: 0 0 3px #ffd27f; }
        }

        .footnote {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #685f44;
        }

        @media (max-width: 700px) {
            .poker-home { padding: 1.5rem; }
            h1 { font-size: 2.2rem; }
            .action-btn { padding: 12px 20px; font-size: 1.5rem; }
            .pot-chip { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="poker-home">
    <div class="welcome-message">
        <i class="fas fa-club"></i>  WELCOME TO THE FELT  <i class="fas fa-spade"></i>
    </div>

    <h1>
        <span class="blink-chip">♦</span> TEXAS HOLD'EM <span class="blink-chip">♠</span>
    </h1>

    <div class="table-talk">
        <i class="fas fa-crown"></i>
        <span>🎴 多轮次游戏竞技 🎴</span>
        <i class="fas fa-coins"></i>
    </div>

    <!-- 状态栏+底池 -->
    <div class="info-bar">
        <span class="game-state-badge" id="gameStateLabel">PRE-FLOP</span>
        <div class="pot-chip" id="potDisplay">0</div>
    </div>

    <!-- 公共牌区 -->
    <div class="board-cards" id="communityCardsContainer">
        <div class="card-slot">?</div>
        <div class="card-slot">?</div>
        <div class="card-slot">?</div>
        <div class="card-slot">?</div>
        <div class="card-slot">?</div>
    </div>

    <!-- 玩家区域 -->
    <div class="players-row" id="playersArea"></div>

    <!-- 决策面板 -->
    <div class="action-panel" id="actionPanel">
        <button class="action-btn" id="callBtn" disabled>📞 CALL</button>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="action-btn" id="raiseBtn" disabled>📈 RAISE</button>
            <input type="number" id="raiseAmount" class="raise-input" value="2" min="1" max="200" step="1" disabled>
        </div>
        <button class="action-btn" id="foldBtn" disabled>🏳️ FOLD</button>
        <span class="hint-text" id="decisionHint">等待开局…</span>
    </div>

    <!-- 日志输出 -->
    <div class="log-area" id="logPanel">
        [系统]  ♠ 欢迎来到德州扑克终端 ♥
    </div>

    <!-- 花色装饰 致敬扑克起源 -->
    <div class="suit-decor">
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
        <span>♠</span>
        <span style="color: #d44b4b;">♥</span>
        <span>♣</span>
        <span style="color: #d44b4b;">♦</span>
    </div>

    <hr />

    <!-- 小巧的调试按钮和免责声明 -->
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
        <div class="footnote">
            <i class="fas fa-shield-alt"></i> 仅供玩法实现，请勿涉及任何金钱交易
        </div>
        <div class="debug-tools">
            <button class="debug-btn" id="debugConnect">🔌 重连</button>
            <button class="debug-btn" id="debugDisconnect">⛔ 断开</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 状态管理 (完全保留原功能) ----------
        let socket = null;
        const token = '[[${jwtToken}]]';   // 保留原占位符

        const state = {
            myPlayerId: null,
            currentDecisionMakerId: -1,
            gameState: 'INIT',
            publicCards: [null, null, null, null, null],
            pot: 0,
            players: [],
            myHoleCards: [null, null]
        };

        // ---------- 辅助函数 ----------
        function suitSymbol(suit) {
            switch (suit) {
                case 'hearts': return '♥';
                case 'diamonds': return '♦';
                case 'clubs': return '♣';
                case 'spades': return '♠';
                default: return '?';
            }
        }

        function cardColor(suit) {
            return (suit === 'hearts' || suit === 'diamonds') ? 'red' : 'black';
        }

        function getPlayerShortName(fullId) {
            if (!fullId) return 'Anonymous';
            return fullId.length > 8 ? fullId.substring(0, 6) + '…' : fullId;
        }

        // 渲染全部
        function renderAll() {
            renderPlayers();
            renderCommunityCards();
            renderMisc();
            highlightDecisionMaker();
        }

        // 渲染玩家
        function renderPlayers() {
            const playersArea = document.getElementById('playersArea');
            playersArea.innerHTML = '';

            let displayPlayers = state.players.length ? state.players : [
                { playerId: null, chipsInHand: 0, chipsInvested: 0, isContinuingGame: false, pokerCard: [null, null] },
                { playerId: null, chipsInHand: 0, chipsInvested: 0, isContinuingGame: false, pokerCard: [null, null] }
            ];

            while (displayPlayers.length < 2) {
                displayPlayers.push({ playerId: null, chipsInHand: 0, chipsInvested: 0, isContinuingGame: false, pokerCard: [null, null] });
            }

            displayPlayers.forEach((player, index) => {
                let card0 = null, card1 = null;
                if (state.myPlayerId && state.myPlayerId.toString() === (index + 1).toString()) {
                    card0 = state.myHoleCards[0];
                    card1 = state.myHoleCards[1];
                } else {
                    card0 = player.pokerCard ? player.pokerCard[0] : null;
                    card1 = player.pokerCard ? player.pokerCard[1] : null;
                }

                const cardClass0 = card0 ? `card ${cardColor(card0.suit)}` : 'hole-card back';
                const cardClass1 = card1 ? `card ${cardColor(card1.suit)}` : 'hole-card back';
                const cardContent0 = card0 ? card0.rank + suitSymbol(card0.suit) : '??';
                const cardContent1 = card1 ? card1.rank + suitSymbol(card1.suit) : '??';

                const playerName = player.playerId ? getPlayerShortName(player.playerId) : `玩家 ${index+1}`;
                const statusIcon = player.isContinuingGame ? '✅' : '⏳';

                const playerHTML = `
                    <div class="player-spot" id="player${index}Spot">
                        <div class="player-name">
                            <span>${playerName}</span>
                            <span class="player-status">${statusIcon}</span>
                        </div>
                        <div class="hole-cards">
                            <div class="${cardClass0}" id="player${index}card0">${cardContent0}</div>
                            <div class="${cardClass1}" id="player${index}card1">${cardContent1}</div>
                        </div>
                        <div class="chips-info">
                            <span>💰 ${player.chipsInHand ?? 0}</span>
                            <span>投入 ${player.chipsInvested ?? 0}</span>
                        </div>
                    </div>
                `;
                playersArea.innerHTML += playerHTML;
            });
        }

        // 公共牌
        function renderCommunityCards() {
            const container = document.getElementById('communityCardsContainer');
            container.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const cardData = state.publicCards && state.publicCards[i];
                if (cardData && cardData.rank && cardData.suit) {
                    const cardDiv = document.createElement('div');
                    cardDiv.className = `card ${cardColor(cardData.suit)}`;
                    const suitSym = suitSymbol(cardData.suit);
                    cardDiv.innerHTML = `
                        <div class="top-left">${cardData.rank}${suitSym}</div>
                        <div class="suit-big">${suitSym}</div>
                        <div class="bottom-right">${cardData.rank}${suitSym}</div>
                    `;
                    container.appendChild(cardDiv);
                } else {
                    const emptySlot = document.createElement('div');
                    emptySlot.className = 'card-slot';
                    emptySlot.textContent = '?';
                    container.appendChild(emptySlot);
                }
            }
        }

        function renderMisc() {
            document.getElementById('gameStateLabel').innerText = state.gameState || '—';
            document.getElementById('potDisplay').innerHTML = `${state.pot}`;
        }

        function highlightDecisionMaker() {
            const hintEl = document.getElementById('decisionHint');
            document.querySelectorAll('.player-spot').forEach(el => el.classList.remove('active-turn'));

            if (state.currentDecisionMakerId && state.currentDecisionMakerId > 0 && state.players.length > 0) {
                const targetIndex = state.players.findIndex(p => p.playerId && p.playerId.toString() === state.currentDecisionMakerId.toString());
                if (targetIndex !== -1) {
                    document.getElementById(`player${targetIndex}Spot`)?.classList.add('active-turn');
                }
            }

            const isMyTurn = (state.currentDecisionMakerId && state.myPlayerId &&
                state.currentDecisionMakerId.toString() === state.myPlayerId.toString());

            if (isMyTurn) {
                hintEl.innerText = '👉 该你行动';
            } else if (state.currentDecisionMakerId && state.currentDecisionMakerId > 0) {
                hintEl.innerText = '🤔 对手思考中 ...';
            } else {
                hintEl.innerText = '⌛ 等待发牌';
            }

            enableActionButtons(isMyTurn);
        }

        function enableActionButtons(enable) {
            ['callBtn', 'raiseBtn', 'foldBtn', 'raiseAmount'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = !enable;
            });
        }

        function addLog(message) {
            const logDiv = document.getElementById('logPanel');
            const p = document.createElement('div');
            p.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(p);
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 25) {
                logDiv.removeChild(logDiv.children[0]);
            }
        }

        // ---------- 消息处理 ----------
        function onServerMessage(jsonStr) {
            try {
                const msg = JSON.parse(jsonStr);
                addLog('📩 ' + msg.dataType);

                if (msg.dataType === 'PLAYER_POS') {
                    state.myPlayerId = msg.data;
                    addLog(`ℹ️ 我的座位: ${state.myPlayerId}`);
                }
                else if (msg.dataType === 'PRIVATE_VO' && msg.data?.holeCards) {
                    state.myHoleCards = msg.data.holeCards;
                    addLog(`🔒 手牌: ${state.myHoleCards.map(c => c.rank + suitSymbol(c.suit)).join(' ')}`);
                }
                else if (msg.dataType === 'PUBLIC_VO' && msg.data) {
                    const d = msg.data;
                    const tablePublic = d.tablePublicVO || {};
                    const playerPublicList = d.playerPublicVO || [];
                    const potPublic = d.potPublicVO || {};

                    state.gameState = tablePublic.currentGameState || state.gameState;
                    state.currentDecisionMakerId = tablePublic.currentDecisionMakerId ?? -1;
                    state.publicCards = tablePublic.publicCards || [];
                    state.pot = potPublic.allInvestedChips ?? 0;

                    state.players = playerPublicList.map(p => ({
                        playerId: p.playerPersonalVO?.info?.playerId || null,
                        chipsInHand: p.chipsInHand ?? 0,
                        chipsInvested: p.chipsInvested ?? 0,
                        isContinuingGame: p.isContinuingGame ?? false,
                        pokerCard: p.pokerCard ?? [null, null],
                    }));
                }
                renderAll();
            } catch (e) {
                addLog('❌ 解析错误: ' + e.message);
            }
        }

        function sendDecision(decision, amount = '0') {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                addLog('❌ 未连接');
                return;
            }
            const msg = { dataType: 'PLAYER_DECISION', data: { decision, amount: amount.toString() } };
            socket.send(JSON.stringify(msg));
            addLog(`🔼 ${decision} ${amount !== '0' ? amount : ''}`);
            enableActionButtons(false);
        }

        // WebSocket 连接
        function connect() {
            if (socket && socket.readyState === WebSocket.OPEN) return;
            try {
                socket = new WebSocket('ws://viphk.nnhk.cc:10253/ws');
                socket.onopen = () => {
                    addLog('✅ WebSocket 连接成功');
                    socket.send(token);
                };
                socket.onmessage = (e) => onServerMessage(e.data);
                socket.onclose = (e) => {
                    addLog(`⚠️ 连接关闭 (${e.code})`);
                    socket = null;
                    enableActionButtons(false);
                };
                socket.onerror = () => addLog('⚠️ 连接错误');
            } catch (e) {
                addLog('❌ 连接失败: ' + e.message);
            }
        }

        function disconnect() {
            if (socket) {
                socket.close();
                socket = null;
                addLog('🔌 手动断开');
            }
        }

        // 绑定UI按钮
        function bindActions() {
            document.getElementById('callBtn').addEventListener('click', () => sendDecision('CALL'));
            document.getElementById('raiseBtn').addEventListener('click', () => {
                const amt = document.getElementById('raiseAmount').value;
                sendDecision('RAISE', amt);
            });
            document.getElementById('foldBtn').addEventListener('click', () => sendDecision('FOLD'));

            document.getElementById('debugConnect').addEventListener('click', connect);
            document.getElementById('debugDisconnect').addEventListener('click', disconnect);
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            bindActions();
            state.players = [
                { playerId: null, chipsInHand: 0, chipsInvested: 0, isContinuingGame: false, pokerCard: [null, null] },
                { playerId: null, chipsInHand: 0, chipsInvested: 0, isContinuingGame: false, pokerCard: [null, null] }
            ];
            renderAll();
            addLog('♠️ 尝试连接服务器...');
            connect();
        });

        window.addEventListener('beforeunload', disconnect);

        window.debug = { connect, disconnect, state };
    })();
</script>
</body>
</html>
